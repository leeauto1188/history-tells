  { month:6,day:29,year:"2007",title:"iPhone发布——重新定义智能手机时代",description:"2007年6月29日，史蒂夫·乔布斯站在旧金山Moscone中心的舞台上，向世界展示了第一代iPhone。这款革命性设备将手机、iPod和互联网通信设备融为一体，通过多点触控技术彻底改变了人机交互方式。发布会现场，乔布斯演示iPhone如何通过手指滑动而非物理键盘来操作，观众为之惊叹。\n\niPhone的发布并非一帆风顺。最初面临质疑，许多人认为其缺乏物理键盘、电池续航短且价格过高。然而，苹果公司凭借优雅的设计、直观的用户界面和创新的App Store生态系统，最终赢得了市场认可。第一代iPhone虽然只有2G网络且不支持第三方应用，但它奠定了现代智能手机的基础，开启了移动互联网时代。",figures:[{name:"史蒂夫·乔布斯",role:"苹果公司CEO"},{name:"乔纳森·艾维",role:"苹果公司首席设计师"}],impact:"iPhone的发布彻底改变了手机行业，触发了智能手机革命，重塑了人们沟通、工作和娱乐的方式。它推动了移动互联网的爆发式增长，催生了应用经济，并改变了多个行业的商业模式。",insight:"iPhone的成功展示了用户体验设计如何颠覆传统行业。在科技快速迭代的时代，苹果证明了真正的创新不仅是技术突破，更是对人性的深刻理解。今天的AI和元宇宙发展同样需要这种以人为本的理念，技术最终应服务于人类需求而非相反。",reading:["《史蒂夫·乔布斯传》— 沃尔特·艾萨克森","《创新公司：皮克斯的启示》— 艾德·卡特姆"]},
  { month:6,day:30,year:"1908",title:"通古斯大爆炸——宇宙之谜的地球印记",description:"1908年6月30日清晨，西伯利亚通古斯卡河流域上空突然出现一个耀眼的火球，随后发生剧烈爆炸。爆炸产生的冲击波相当于2000万吨TNT当量，摧毁了约2000平方公里的森林，8000万棵树木被焚毁或倒伏。目击者数百公里外都能看到明亮的闪光和听到震耳欲聋的轰鸣，甚至欧洲部分地区观测到异常的亮度和夜空现象。\n\n这场被后世称为'通古斯大爆炸'的事件，至今仍是科学界最大的谜团之一。爆炸产生的蘑菇云高达20公里，冲击波环绕地球两圈。由于事发地点偏远且当时俄罗斯政治动荡，直到1927年科学家库利克才首次组织考察队前往现场。尽管提出了超新星碎片、反物质、甚至特斯拉实验等多种理论，但主流观点认为这是一场彗星或小行星在空中解体造成的爆炸，而非直接撞击地面。",figures:[{name:"列昂尼德·库利克",role:"苏联矿物学家，首次领导通古斯大爆炸考察队"},{name:"安德鲁·奥尔洛夫",role:"苏联地质学家，1950年代对通古斯事件进行深入研究"},{name:"维克托·别利亚耶夫",role:"苏联物理学家，提出爆炸是由彗冰解体引起的理论"}],impact:"通古斯大爆炸是人类历史上记录最完整的天体撞击事件，促使科学家开始认真研究近地小行星对地球的潜在威胁，推动了天体物理学和行星防御科学的发展。这一事件也成为核武器威力的重要参照，帮助科学家理解大规模爆炸的物理效应。",insight:"通古斯大爆炸提醒我们，地球并非绝对安全。在当代航天技术和监测系统发达的今天，小行星撞击风险虽低但存在。2022年NASA成功撞击小行星改变其轨道，正是对这类风险的直接应对。通古斯事件启示我们，面对未知宇宙力量，科学探索与全球协作是人类生存的必然选择。",reading:["《通古斯事件：宇宙撞击地球的神秘之谜》— 米哈伊尔·季莫费耶夫","《末日之钟：小行星撞击与地球防御》— 比尔·奈伊","《宇宙灾难：地球面临的威胁》— 菲利普·普莱特"]},
  { month:7,day:3,year:"1977",title:"首个个人电脑诞生——计算民主化的起点",description:"1977年7月3日，苹果公司Apple II正式发布，这款由史蒂夫·沃兹尼亚克设计的个人电脑成为第一款大规模生产的成功个人电脑。与早期计算机不同，Apple II采用彩色图形、开放架构和相对亲民的价格，使普通家庭和学校都能负担得起。沃兹尼亚克在车库里精心设计的电路板，配合乔布斯的营销愿景，彻底改变了计算机从大型机构专属工具向个人可及设备的转变。\n\nApple II的发布标志着个人电脑时代的真正开始，它不仅开创了计算机普及的先河，更催生了软件产业的蓬勃发展。这款电脑的销量超过600万台，成为当时最受欢迎的个人电脑，为苹果公司奠定了行业基础。它的设计理念影响了后续几乎所有个人电脑的发展轨迹，让计算能力从实验室和大型企业走向千家万户。",figures:[{name:"史蒂夫·沃兹尼亚克",role:"Apple II主要设计师"},{name:"史蒂夫·乔布斯",role:"苹果公司联合创始人"}],impact:"Apple II的成功直接推动了个人电脑革命，催生了软件产业的繁荣，并改变了全球工作、学习和娱乐方式。",insight:"Apple II的诞生展示了技术民主化的力量——当复杂技术被简化并赋予人性化界面时，它能释放出指数级的社会创造力。今天的AI革命同样面临类似挑战：如何将强大的AI技术转化为普通人能够使用和创造的工具，而非少数精英的专属。开放架构、用户友好设计和社会普惠，仍是科技变革的核心价值。",reading:["《史蒂夫·乔布斯传》— 沃尔特·艾萨克森","《硅谷之火》— 斯蒂芬·沃兹尼亚克"]},
  { month:7,day:5,year:"1687",title:"牛顿《自然哲学的数学原理》出版——科学革命的巅峰",description:"1687年7月5日，艾萨克·牛顿的《自然哲学的数学原理》正式出版。这部划时代的著作不仅系统阐述了牛顿运动定律和万有引力定律，更将天体运动与地面物体运动统一起来，揭示了自然界的基本规律。书中使用严密的数学语言，通过几何方法证明了开普勒行星运动定律，建立了经典力学体系。\n\n这部著作的出版标志着科学革命的巅峰，彻底改变了人类对宇宙的理解。牛顿将天上的星辰和地上的物体置于同一物理定律之下，打破了亚里士多德以来的世界观。书中提出的力学框架统治了物理学界长达两个多世纪，直到爱因斯坦的相对论出现才被超越，其影响远超科学领域，深刻影响了启蒙运动和现代文明的形成。",figures:[{name:"艾萨克·牛顿",role:"英国物理学家、数学家、天文学家，著作作者"},{name:"埃德蒙·哈雷",role:"英国天文学家，资助并促成该书出版"}],impact:"《自然哲学的数学原理》的出版奠定了经典物理学的基础，为后续科学革命提供了方法论和理论框架。它直接影响了欧洲启蒙运动，推动了理性主义思想的传播，并为工业革命提供了科学基础。",insight:"牛顿的成就展示了跨学科思考的力量——他将数学、物理和天文学融为一体，创造出解释世界的全新框架。在当今AI与大数据时代，这种整合不同领域知识、寻找底层规律的方法论尤为重要。牛顿的工作提醒我们，突破性创新往往来自于将看似不相关的概念连接起来，构建统一的理论体系。",reading:["《自然哲学的数学原理》— 艾萨克·牛顿","《牛顿传》— 理查德·韦斯特福尔"]},
  { month:7,day:6,year:"1944",title:"霍特马戏团大火——灾难中的警示",description:"1944年7月6日下午，美国康涅狄格州哈特福德市的霍特马戏团表演正酣时，一场突如其来的大火吞噬了帐篷顶棚。约8000名观众在恐慌中争相逃命，最终造成168人死亡，超过700人受伤。目击者描述，火焰如同巨兽般蔓延，孩子们被父母高举过头顶，空气中弥漫着恐慌与绝望的哭喊声。这场灾难发生得如此突然，以至于许多人甚至来不及反应就被烈火吞噬。\n\n这场悲剧的根源是马戏团为了防水而在帆布帐篷上涂抹了易燃的蜡和汽油。火源可能来自未熄灭的烟头或电气故障。大火发生后，救援人员迅速赶到现场，但为时已晚。这场灾难成为美国历史上最严重的马戏团事故，也是康涅狄格州历史上最致命的火灾之一。幸存者多年后回忆，那一天的热浪、烟尘和哭喊声永远烙印在他们的记忆中。",figures:[{name:"詹姆斯·霍特",role:"马戏团所有者"},{name:"罗伯特·达文波特",role:"哈特福德市消防队长"}],impact:"霍特马戏团大火直接推动了美国公共场所安全法规的全面修订，特别是针对大型集会场所的防火标准和紧急出口要求。这一事件促使消防法规更加严格，并催生了现代建筑安全设计的许多基本原则。",insight:"霍特马戏团大火提醒我们，在追求娱乐和商业利益的同时，安全规范的重要性不容忽视。今天的科技虽然大大降低了类似灾难发生的概率，但人类组织中的系统性风险依然存在。无论是企业安全管理、公共设施设计还是AI系统的伦理边界，历史都在警示我们：忽视细节和规范，可能带来无法挽回的后果。",reading:["《The Great Hartford Circus Fire》— Stewart O'Nan","《Circus Fire: A True Story of an American Tragedy》— Stewart O'Nan"]},
  { month:7,day:8,year:"1947",title:"罗斯威尔事件——现代UFO文化的起点",description:"1947年7月8日，美国新墨西哥州罗斯威尔的《罗斯威尔每日纪事报》头版刊登惊人消息：空军在当地农场发现'飞碟'残骸。军方最初称这是坠毁的'飞碟'，引发全国轰动。然而24小时后，军方改口称这只是一个气象气球的残骸，事件逐渐淡出公众视野。\n\n直到30多年后，目击者和参与调查者开始陆续披露新证据，包括声称发现了外星人尸体和军方掩盖真相的说法。这些爆料催生了大量书籍、纪录片和影视作品，使罗斯威尔成为全球UFO研究的代名词，也催生了现代外星文化现象。",figures:[{name:"杰西·马歇尔",role:"《罗斯威尔每日纪事报》主编，最初发布飞碟报道的记者"},{name:"威廉·布拉特福德",role:"罗斯威尔陆军航空队基地指挥官，最初确认发现'飞碟'的军方官员"}],impact:"罗斯威尔事件成为现代UFO研究的标志性事件，催生了全球范围内的外星文化热潮，影响了科幻创作、流行文化乃至政府透明度政策。",insight:"罗斯威尔事件展示了信息传播中的'确认偏误'现象——人们倾向于接受符合自身信念的信息，同时忽略或拒绝矛盾证据。在信息爆炸的今天，这一现象在社交媒体时代被放大，形成'信息茧房'。事件也揭示了政府与公众之间的信任脆弱性，以及真相如何在叙事竞争中被重构。",reading:["《罗斯威尔事件：官方档案与揭秘》— 唐纳德·施密特","《UFO：罗斯威尔事件的50年》— 凯文·R·兰德尔"]},
  { month:7,day:9,year:"1755",title:"布兰迪wine战役——殖民地与帝国命运的转折点",description:"1755年7月9日，在北美宾夕法尼亚州今匹兹堡附近，英法殖民地军队与印第安盟友爆发了布兰迪wine战役。这是七年战争北美洲战场的关键战役，英军将领爱德华·布拉多克率领正规军试图夺取法国杜肯堡，却遭遇惨败。布拉多克本人战死，英军伤亡近千，而法军及其印第安盟友仅损失约百人。战役中，年轻的本杰明·富兰克林曾协助英军组织运输，而乔治·华盛顿则作为副官参与战斗，亲历了这场决定北美殖民地命运的惨败。\n\n这场战役不仅改变了北美殖民地的军事格局，也深刻影响了殖民者与原住民的关系。英军的失败暴露了正规军在北美丛林作战的劣势，促使殖民地开始发展自己的民兵力量。同时，法国获得胜利后暂时控制了俄亥俄流域，但不久后随着普雷斯科特堡的陷落，英国开始反攻，最终将法国势力逐出北美。布兰迪wine战役的失败为美国独立战争埋下了伏笔，殖民地居民开始质疑英国军事能力的可靠性，自治意识逐渐增强。",figures:[{name:"爱德华·布拉多克",role:"英军将领，北美远征军总指挥"},{name:"乔治·华盛顿",role:"英军副官，北美殖民地军官"},{name:"蒙卡尔姆",role:"法军将领，指挥法军及印第安盟友"}],impact:"布兰迪wine战役的失败使英国失去了对北美西部地区的控制，加速了法国在北美的势力衰退。战役促使殖民地开始发展自己的军事力量，增强了自治意识，为后来的美国独立战争奠定了基础。",insight:"布兰迪wine战役揭示了组织结构与环境不匹配的风险。英国正规军沿用欧洲战术，忽视北美丛林作战的特殊性，导致惨败。这提醒当代组织：成功模式需适应环境变化，僵化遵循传统会导致失败。在全球化与数字化时代，组织需保持灵活性，因地制宜调整战略，而非简单复制成功经验。",reading:["《七年战争：1754-1763的全球冲突》— 弗雷德里克·基布森","《华盛顿的崛起：1753-1775》— 查尔斯·克伦茨"]},
  { month:7,day:10,year:"1991",title:"苏联解体——冷战终结的最后一环",description:"1991年7月10日，俄罗斯联邦总统鲍里斯·叶利钦正式签署命令，将苏联的共产党、克格勃等关键机构权力转移到俄罗斯政府手中，这一举动实际上宣告了苏联作为统一国家的终结。此前，在1991年8月的政变失败后，各加盟共和国纷纷宣布独立，叶利钦的命令则从法律上确认了这一现实。莫斯科红场上，镰刀锤子旗被缓缓降下，取而代之的是三色旗，这一历史性时刻标志着长达74年的苏联历史正式画上句号。\n\n苏联解体不仅改变了世界政治格局，也深刻影响了20世纪后半叶的国际关系。冷战结束后，美国成为唯一超级大国，北约得以向东扩张，而前苏联地区则陷入政治经济动荡。这一事件重塑了欧洲安全架构，为后来的北约东扩埋下伏笔，也使得全球化进程加速，但同时也在原苏联加盟共和国间留下了诸多领土争端和民族矛盾，这些影响至今仍在国际关系中显现。",figures:[{name:"鲍里斯·叶利钦",role:"俄罗斯联邦首任总统"},{name:"米哈伊尔·戈尔巴乔夫",role:"苏联最后一任领导人"}],impact:"苏联解体标志着冷战正式结束，世界两极格局被打破，美国成为唯一超级大国，开启了单极时代。这一事件导致了东欧剧变和前苏联地区的政治重组，重塑了全球力量平衡和国际秩序。",insight:"苏联解体展示了大型组织变革中的临界点效应——看似稳固的结构可能在短时间内崩塌。这一历史教训对当代企业和组织管理具有启示意义：当核心价值体系瓦解、领导层分裂且失去民众支持时，即便是庞然大物也难逃解体命运。在当今快速变化的商业和技术环境中，组织的韧性和适应性比规模更为关键。",reading:["《苏联的最后一天》— 奥兰多·费格斯","《冷战》— 约翰·刘易斯·加迪斯"]},
  { month:7,day:11,year:"1995",title:"斯雷布雷尼察大屠杀——人类良知的至暗时刻",description:"1995年7月11日，波斯尼亚战争期间，塞族部队攻入联合国划定的'安全区'斯雷布雷尼察镇，随后对约8000名波斯尼亚穆斯林男子和男孩进行了系统性的屠杀。这是二战后欧洲最严重的种族灭绝事件之一，屠杀持续数日，受害者被集体处决后掩埋于乱葬岗。幸存者回忆，联合国'蓝盔部队'目睹屠杀却未能有效干预，成为国际社会集体失职的象征。\n\n这场大震惊了国际社会，最终促使北约军事介入并促成《代顿协议》的签订，结束了波黑战争。2015年，联合国将7月11日定为'斯雷布雷尼察纪念日'，缅怀遇难者并警示种族主义的危害。然而，至今仍有部分否认者试图淡化这一历史事实，幸存者家属仍在寻找亲人遗骸，正义与和解的道路依然漫长。",figures:[{name:"拉特科·姆拉迪奇",role:"塞族军队指挥官，被控犯下战争罪和种族灭绝罪"},{name:"罗宾·库克",role:"英国外交大臣，最早公开谴责斯雷布雷尼察屠杀的西方政治家"}],impact:"斯雷布雷尼察大屠杀导致联合国'安全区'概念的崩溃，促使国际社会重新思考'保护责任'原则；这一事件成为国际刑事法庭审理的重要案件，首次将'种族灭绝'罪应用于前南斯拉夫战犯。",insight:"在当今民族主义抬头、族群对立加剧的时代，斯雷布雷尼察提醒我们：制度性保护机制可能失效，而个体良知与集体行动才是防止历史悲剧重演的关键。科技虽能记录真相，但无法替代人类对'他者'的共情与责任。商业组织中的多元包容、AI伦理中的价值观对齐，本质上都是对'不伤害'原则的现代诠释。",reading:["《斯雷布雷尼察：欧洲的种族灭绝》— 戴维·利奇","《我们失去的荣誉》— 沃伊斯拉夫·舍舍利"]},
  { month:7,day:12,year:"1979",title:"所罗门群岛独立——太平洋小国的主权觉醒",description:"1979年7月12日，位于西南太平洋的所罗门群岛正式从英国殖民统治下获得独立，成为英联邦内的主权国家。这个由992个岛屿组成的岛国，经历了近一个世纪的殖民统治后，终于迎来了属于自己的政治命运。独立仪式在霍尼亚拉举行，英国代表移交了象征主权的法律文件，所罗门国旗首次在议会大厦前升起，标志着这个以美拉尼西亚人为主体的国家开启了历史新篇章。\n\n所罗门群岛的独立过程相对和平，没有经历其他地区常见的暴力冲突。然而，独立后的国家建设面临诸多挑战，包括经济发展、民族团结与外部势力影响等问题。这个拥有丰富自然资源和独特文化的太平洋岛国，在独立后的几十年里，既经历了政治动荡，也努力在国际舞台上寻找自己的定位，成为太平洋地区小国争取自主发展的一个缩影。",figures:[{name:"彼得·凯尼洛雷亚",role:"所罗门群岛首任总理"},{name:"乔治·萨迪",role:"所罗门群岛独立运动领袖"}],impact:"所罗门群岛的独立标志着英国在太平洋地区殖民统治的进一步衰落，同时也为其他太平洋岛国的独立运动提供了榜样。该事件改变了太平洋地区的政治格局，使所罗门群岛能够自主决定其内外政策，并在联合国等国际组织中发声。",insight:"所罗门群岛的独立历程启示我们，即使是资源有限的小国，也能通过外交智慧和内部团结在国际舞台上立足。在当今全球化与区域一体化背景下，小国如何在保持文化特色与适应国际规则之间找到平衡，仍是值得深思的课题。这为当代组织管理和国家治理提供了关于身份认同与战略定位的思考维度。",reading:["《所罗门群岛历史》— 大卫·希尔","《太平洋岛国的政治发展》— 罗纳德·克罗瑟斯"]},
  { month:7,day:13,year:"1977",title:"纽约大停电——现代城市脆弱性的警示",description:"1977年7月13日晚，纽约市遭遇了一场史无前例的大停电。电力系统突然崩溃，整个城市陷入黑暗，从曼哈顿到布朗克斯，影响超过900万居民。停电持续长达25小时，城市秩序迅速瓦解，抢劫和骚乱蔓延，数千人被捕。街头的应急灯光映照着混乱的面孔，商店橱窗被砸碎，消防车和警笛声彻夜不息，这座城市仿佛瞬间退回了原始状态。\n\n这场灾难并非单纯的技术故障，而是多重因素叠加的结果。当年纽约正面临严重的财政危机，基础设施投资不足，加上夏季用电高峰和雷暴天气，最终压垮了老化的电网。然而，在黑暗中也有人性闪光点：许多居民自发组织起来，为老人和儿童提供帮助，街头的音乐家在烛光中演奏，形成了一幅末日般的社区图景。这场混乱成为了美国城市危机的象征，也暴露了现代都市生活的脆弱性。",figures:[{name:"亚伯拉罕·比姆",role:"纽约市市长"},{name:"休·凯里",role:"纽约州州长"}],impact:"纽约大停电直接推动了美国电网基础设施的全面升级，促使联邦政府加强对电力系统的监管和投资。同时，这场事件也深刻影响了城市规划理念，使城市韧性成为现代城市管理的重要考量。",insight:"纽约大停电揭示了复杂系统中的连锁反应风险，这一原理在当今数字化时代更显重要。从电网到互联网，从金融系统到人工智能，我们构建的超级复杂系统同样面临单点故障风险。现代组织需要思考的不仅是技术可靠性，更是系统韧性设计，包括冗余机制、应急预案和分布式架构，以应对不可预测的系统性崩溃。",reading:["《黑暗中的城市：1977年纽约大停电》— 约翰·布里顿","《脆弱的系统：现代基础设施的教训》— 丽贝卡·阿伦斯"]},
  { month:7,day:15,year:"1971",title:"尼克松访华决定——冷战格局的转折点",description:"1971年7月15日，美国总统尼克松突然宣布将于次年访问中华人民共和国。这一震惊世界的消息是通过电视向全球公布的，尼克松在白宫椭圆形办公室前表示，这次访问将为两国关系开启'新的篇章'。这一决定是在极度保密的情况下做出的，基辛格博士已在一个月前秘密访华，与周恩来总理进行了为期一周的会谈。\n\n这一宣布标志着美国长达二十多年的对华孤立政策的终结，也标志着冷战格局的重大转变。当时，美苏正处于激烈对抗时期，而中国与苏联关系也已恶化。这一外交突破不仅改变了中美两国的关系走向，也深刻影响了全球政治力量平衡，为后来的国际关系发展奠定了基础。",figures:[{name:"理查德·尼克松",role:"美国总统"},{name:"亨利·基辛格",role:"美国国家安全顾问"},{name:"周恩来",role:"中华人民共和国国务院总理"}],impact:"尼克松访华直接促成了1972年《上海公报》的签署，正式结束了中美两国之间的长期隔绝。这一事件推动了中华人民共和国重返联合国，并最终导致1979年中美正式建交，彻底改变了冷战时期的国际政治格局。",insight:"尼克松访华展现了外交突破的非凡价值——在看似不可能的敌对关系中寻找共同利益。这一历史事件启示我们，即使在高度对立的环境中，通过创造性外交和战略耐心，仍能实现关系正常化。在当今全球化与地缘政治复杂交织的时代，这一案例提醒我们，国际关系中的灵活性、远见和敢于打破常规的外交智慧，仍是解决当代全球挑战的关键要素。",reading:["《尼克松与中国：改变世界的一周》— 理查德·尼克松","《基辛格回忆录》— 亨利·基辛格","《毛泽东、周恩来与尼克松》— 王立"]},
  { month:4,day:24,year:"1990年",title:"哈勃空间望远镜升空——人类装上了宇宙之眼",description:"1990年4月24日，美国发现号航天飞机将哈勃空间望远镜送入距地球600公里的轨道。这是人类历史上造价最昂贵、也最终最值得的科学仪器之一。\n\n然而升空后的第一张照片令科学家们目瞪口呆——主镜存在仅2.2微米的球面像差，相当于头发丝的五十分之一，却足以让所有图像模糊不清。NASA遭受了史上最惨烈的公关危机之一，媒体嘲讽它是「价值15亿美元的近视眼」。\n\n1993年，宇航员在太空完成了精密的视力矫正手术。此后，哈勃发回了改变人类宇宙观的壮丽图像：哈勃深场照片让我们看到130亿光年外的星系群落，精确测定宇宙年龄138亿年，并提供了暗能量存在的关键证据。",figures:[{name:"埃德温·哈勃",role:"望远镜命名者，确立宇宙膨胀理论的天文学家"},{name:"莱曼·斯皮策",role:"最早提出建造太空望远镜构想的科学家"}],impact:"哈勃彻底改变了人类对宇宙的认知，证明宇宙在加速膨胀，揭示超大质量黑洞几乎存在于每个星系中心。迄今已完成超过160万次科学观测，发表论文超过2万篇。",insight:"哈勃最深刻的启示不是它看到了什么，而是它的修复故事：一个设计之初就预留了可维修接口的系统，才能在灾难性失误后被挽救。容错设计和可迭代性是复杂系统最重要的特质。在AI时代，可解释、可纠错的模型远比不透明的黑箱系统更有长期价值——技术的进步不是永不出错，而是出错后能被修复。",reading:["《哈勃：宇宙的眼睛》— 加博·哈勃","纪录片《哈勃太空望远镜》(IMAX)"]},
  { month:5,day:3,year:"1469年",title:"马基雅维利诞生——权力的解剖者",description:"1469年5月3日，尼可洛·马基雅维利出生于佛罗伦萨。他在美第奇家族与共和制之间的政治漩涡中担任外交官长达14年，积累了对权力运作的第一手观察。\n\n1512年，美第奇家族复辟，马基雅维利被解职、监禁，甚至遭受酷刑。在流放乡间的岁月里，他写下了《君主论》——一本彻底剥离道德包装、直面权力现实的书：君主必要时可以欺骗，但要善于伪装；宁可被人畏惧而非被人爱；不要依赖雇佣军，要建立自己的力量。\n\n《君主论》在他死后五年才出版，随即被列为禁书。五百年后，它依然是政治学、管理学和战略研究的必读经典。「马基雅维利」这个名字，永久地进入了人类的语言。",figures:[{name:"尼可洛·马基雅维利",role:"政治思想家，佛罗伦萨共和国外交秘书"},{name:"洛伦佐·美第奇",role:"《君主论》的献书对象，佛罗伦萨实际统治者"}],impact:"马基雅维利开创了现代政治科学，将政治从神学和道德哲学中独立出来，以现实主义视角分析权力运作。「马基雅维利主义」成为描述不择手段之政治行为的专有名词。",insight:"马基雅维利的核心贡献是区分了「应然」与「实然」——他不描述政治应该怎样，而是如实记录政治实际上怎样运作。这种直面现实的分析范式，在商业战略、组织管理和产品竞争中同样有效。读懂马基雅维利，不是学会不择手段，而是不再被表面的道德叙事所欺骗，看清楚权力真正是如何流动的。",reading:["《君主论》— 尼可洛·马基雅维利","《马基雅维利传》— 毛里齐奥·维罗利"]},
  { month:5,day:10,year:"1869年",title:"太平洋铁路竣工——一枚金钉，连接两个大洋",description:"1869年5月10日，犹他州普罗蒙特里，中央太平洋铁路和联合太平洋铁路的钢轨在这里相接。一枚镀金道钉被敲入枕木，电报信号传遍全美：「DONE（完成了）」。全国各地的人们涌上街头庆祝。\n\n这条横贯大陆的铁路全长近3000公里，耗时6年建成。承担最艰苦施工任务的，是约1.5万名华工——他们开山炸石、穿越塞拉内华达山脉，在严寒和爆破的危险中日夜劳作，却未被邀请参加竣工典礼，也未出现在任何历史照片中。\n\n铁路通车后，从纽约到旧金山的旅行时间从六个月压缩至六天。美国西部的开发速度呈指数级加快，一个真正意义上统一的大陆市场由此诞生。",figures:[{name:"利兰·斯坦福",role:"中央太平洋铁路总裁，后创立斯坦福大学"},{name:"托马斯·杜兰特",role:"联合太平洋铁路副总裁"}],impact:"太平洋铁路彻底整合了美国经济，加速了西部移民和工业化，奠定了美国成为世界强国的地理基础。同时也加剧了对美洲原住民土地的侵占，是进步与代价并存的典型案例。",insight:"基础设施的规模决定了经济的天花板。太平洋铁路让美国从分散的沿海国家变成统一的大陆经济体，这一跃迁无法通过渐进式改良实现，只能通过一次大规模的基础设施投资完成。今天中国的高铁网络、全球的海底光缆，遵循的都是同样的逻辑——基础设施是国家竞争力最持久的底座，其回报往往在建成数十年后才充分显现。",reading:["《决定性时刻》— 斯蒂芬·安布罗斯","《铁路改变世界》— 克里斯蒂安·沃尔玛"]},
  { month:5,day:27,year:"1937年",title:"金门大桥通车——工程与美学的完美融合",description:"1937年5月27日，旧金山金门大桥向行人开放。20万人步行穿越这座当时世界上最长的悬索桥，人们在桥上唱歌、跳舞。次日，汽车通行正式开始。\n\n工程师约瑟夫·斯特劳斯提出方案时，几乎无人相信它能建成：太平洋的狂风、旧金山湾的强流与海雾，都被认为是不可克服的障碍。工程历时4年，在大萧条最艰难的时期开工，工人们在1930年代罕见地配备了安全网——这救了19人的性命。\n\n大桥的「国际橙」涂装并非出于审美，而是工程需要：橙色在旧金山的海雾中具有最高可见度。美丽是功能的副产品。这座桥成为20世纪最具辨识度的建筑之一，也是旧金山乃至整个美国西海岸的精神象征。",figures:[{name:"约瑟夫·斯特劳斯",role:"首席工程师，项目推动者"},{name:"查尔斯·埃利斯",role:"实际完成核心设计的工程师，长期未获认可"}],impact:"金门大桥将旧金山与马林县的通行时间从渡轮的一小时压缩至几分钟，极大促进了旧金山湾区经济一体化，成为推动加州经济腾飞的基础设施之一。",insight:"金门大桥最被忽视的故事是查尔斯·埃利斯——他完成了大部分核心设计，却被斯特劳斯解雇，长期未获认可。真正的创造者往往活在署名者的阴影里。在AI辅助创作日益普及的今天，「谁是真正的创造者」这个问题变得更加复杂。组织如何识别和保护真正的创造性贡献，是管理者面临的永恒难题。",reading:["《建造金门大桥》— 约翰·范德·泽","《美国基础设施》— 布莱恩·艾伦"]},
  { month:6,day:3,year:"1965年",title:"人类首次美国太空行走——23分钟的自由漂浮",description:"1965年6月3日，爱德华·怀特从双子座4号飞船飞出，成为第一个在太空行走的美国人。他在飞船外漂浮了23分钟，手持一把小型喷气枪控制方向，在距地球约280公里的高空俯瞰蓝色星球。\n\n怀特事后说，在太空漂浮是他一生中最美妙的体验，而返回舱内是他做过的最艰难的事。三个月前，苏联宇航员列昂诺夫已完成了人类历史上第一次太空行走，美国人迅速以这次行走作为回应。\n\n两年后，怀特在阿波罗1号的地面测试火灾中与两名队友一同罹难，成为美国航天史上第一批牺牲的宇航员。他在太空中漂浮的那张照片，成为整个航天时代最具象征性的影像之一。",figures:[{name:"爱德华·怀特",role:"第一个太空行走的美国人，后牺牲于阿波罗1号事故"},{name:"詹姆斯·麦克迪维特",role:"双子座4号指令长"}],impact:"太空行走技术的成功验证，为此后的哈勃望远镜维修、国际空间站建造等关键任务奠定了基础，证明了人类可以在太空中执行复杂的舱外操作。",insight:"怀特在太空漂浮的23分钟，是人类第一次真正以「局外人」视角俯瞰整个文明。那种从内部切换到外部的视角转变，往往是最深刻认知突破的来源。产品经理、创业者、战略家都需要定期「出舱」——从系统外部审视自己正在做的事，而不是永远困在流程的内部视角里。",reading:["纪录片《双子座计划》","《最后一次任务》— 尼尔·汉森"]},
  { month:6,day:4,year:"1940年",title:"敦刻尔克撤退完成——失败中的战略胜利",description:"1940年6月4日，代号「发电机行动」的敦刻尔克大撤退正式结束。338226名英法联军士兵被从法国北部海滩撤回英国，在军事史上创造了奇迹。\n\n九天前，德军装甲部队几乎将40万盟军逼入绝境。希特勒一个至今众说纷纭的「停止命令」给了英国喘息的机会。英国皇家海军动员了850艘船只，其中包括数百艘由平民自愿驾驶的渔船、游艇和小艇，在德国空军轰炸下日夜不停地抢运士兵。\n\n就在撤退结束的同一天，丘吉尔在议会发表了著名演讲：「我们将在海滩上战斗，我们将在陆地上战斗……我们永远不会投降。」撤退本身是一场战术惨败，但那句话把失败变成了精神的胜利，将英国人的意志凝聚成钢铁。",figures:[{name:"温斯顿·丘吉尔",role:"英国首相，凭演讲凝聚民心"},{name:"伯特伦·拉姆齐",role:"撤退行动海军指挥官"}],impact:"敦刻尔克保全了英国继续抗战的核心军事力量，成为此后盟军反攻欧洲的人员基础。若这批军队全军覆没，英国极可能被迫求和，二战走向将彻底改变。",insight:"敦刻尔克的本质是：在战术失败中保存战略资源。许多组织在危机中犯的最大错误，是为了挽救局部而消耗掉全部。知道何时该「有序撤退」、如何体面地撤退，是领导力中最难掌握也最被低估的技能。丘吉尔的伟大不只在于他说了什么，更在于他在最坏的时刻让人们相信还有明天。",reading:["《敦刻尔克》— 约书亚·莱文","《至暗时刻》— 约翰·卢卡奇斯"]},
  { month:6,day:7,year:"1494年",title:"托尔德西里亚斯条约——两个国家瓜分了整个世界",description:"1494年6月7日，西班牙和葡萄牙在教皇亚历山大六世的仲裁下，签署了《托尔德西里亚斯条约》。两国在大西洋中划定了一条分界线，以西归西班牙，以东归葡萄牙。整个世界，就这样被两个国家在一张地图上瓜分完毕。\n\n这条线是在哥伦布首航归来两年后划定的。彼时欧洲人对新大陆的了解极为有限，两国代表实际上是在一张充满空白的地图上随手画线。葡萄牙因此获得了巴西和通往亚洲的东方航线；西班牙得到了美洲的绝大部分。\n\n条约完全无视了世界上其他所有国家和民族的存在——那片土地上已居住着数以千万计的原住民。英法荷等国拒绝承认这一安排，随后开启了长达数百年的殖民争夺。",figures:[{name:"教皇亚历山大六世",role:"仲裁者，将世界的瓜分赋予「神圣」合法性"},{name:"若昂二世",role:"葡萄牙国王，谈判的主要推动者"}],impact:"条约直接决定了南美洲的语言版图（葡语巴西与西班牙语其余地区），并为此后数百年的欧洲殖民体系提供了「合法性」框架，影响延续至今。",insight:"两个强国坐下来把整个世界划分完毕——这在今天看来荒谬，但类似的逻辑从未消失。从雅尔塔会议到今天科技巨头划分数据领地、平台制定规则，强者定义游戏规则的模式始终在上演。区别只在于，今天的「分界线」更多是算法、标准和数据，而非地图上的经纬线。",reading:["《征服者》— 罗杰·克劳利","《1493》— 查尔斯·曼恩"]},
  { month:6,day:8,year:"1949年",title:"《1984》出版——最精准的反乌托邦预言",description:"1949年6月8日，乔治·奥威尔的《1984》由英国出版社出版。彼时奥威尔正在苏格兰的偏远农场里与肺结核搏斗，已深知自己时日不多——七个月后，他便离开了人世。\n\n小说构建了一个「老大哥在看着你」的极权世界：双重思想、新话、思想警察、历史被不断改写的真理部……这些词汇从此永久进入了人类的政治词典。奥威尔将斯大林主义和法西斯的特征提炼成一个普适的极权主义模型。\n\n《1984》首印五万册，此后从未绝版。它在每一个政治高压时期都会迎来销量高峰——包括2017年特朗普就职典礼后，这本书一度成为亚马逊畅销榜第一名。七十多年过去，它对现实的解释力仍未衰减。",figures:[{name:"乔治·奥威尔",role:"作家，本名埃里克·布莱尔，写作时已身患绝症"}],impact:"《1984》创造了「老大哥」「双重思想」「新话」等政治词汇，深刻影响了西方社会对极权主义的认知框架，成为20世纪最重要的政治寓言小说，至今仍是全球阅读量最大的书籍之一。",insight:"奥威尔最深刻的洞见不是极权的残暴，而是极权对语言的控制——「新话」的核心是通过限制词汇来限制思想。今天，算法推荐系统通过另一种方式在做类似的事：不是删除词汇，而是塑造我们「看到什么」「觉得什么重要」。信息茧房是一种更温和、更难察觉、也更难逃脱的「新话」。",reading:["《1984》— 乔治·奥威尔","《奥威尔传》— 迈克尔·谢尔登"]},
  { month:6,day:9,year:"1870年",title:"狄更斯辞世——用小说改变了法律的人",description:"1870年6月9日，查尔斯·狄更斯在英国盖兹山庄突发脑溢血，次日辞世，享年58岁。前一天他还在伏案写作未完成的《埃德温·德鲁德之谜》。他留下遗愿，不希望有盛大的葬礼，但数万伦敦市民自发聚集在他的墓前哀悼。\n\n狄更斯出生贫寒，12岁便进入鞋油工厂做童工，父亲因债入狱。这段屈辱的经历成为他一生写作的燃料。他用小说描绘了维多利亚时代工业化浪潮中被忽视的群体：《雾都孤儿》里的童工、《双城记》里的革命与牺牲、《圣诞颂歌》里的贪婪与救赎……\n\n他也是那个时代最具影响力的社会活动家。他的小说直接推动了英国废除童工、改革监狱制度的立法变革。英国首相曾说：「狄更斯为英国穷人做的，比任何立法者都多。」",figures:[{name:"查尔斯·狄更斯",role:"作家，维多利亚时代最伟大的小说家与社会改革推动者"}],impact:"狄更斯的作品直接推动了英国多项社会改革立法，改善了童工和监狱制度，同时奠定了现实主义小说传统，深刻影响了陀思妥耶夫斯基、托尔斯泰、卡夫卡等无数后来的作家。",insight:"狄更斯证明了叙事的政治力量。他没有写政论，没有游说议员，只是把穷人的真实生活写得栩栩如生——然后整个社会的舆论就转动了，法律就改变了。在今天信息过载的时代，能让人真正产生共情的故事，比数据报告和逻辑论证更能改变人的认知与行动。这是「内容创作」被低估的真正价值。",reading:["《狄更斯传》— 彼得·阿克罗伊德","《双城记》— 查尔斯·狄更斯"]},
  { month:6,day:13,year:"1966年",title:"米兰达权利确立——无知者与有知者应当平等",description:"1966年6月13日，美国最高法院以5比4的微弱多数，在「米兰达诉亚利桑那州案」中作出裁决：警察在逮捕嫌疑人后，必须明确告知其沉默权和获得律师帮助的权利。否则，任何在此之前获得的供词不得作为证据使用。\n\n案件的主角埃内斯托·米兰达是一名文化程度不高的工人，他在完全不知道自己有权沉默的情况下，向警察签署了认罪书。首席大法官厄尔·沃伦在裁决书中写道：「无知的人与有知识的人在面对审讯时，应当拥有同等的权利保护。」\n\n如今，「你有权保持沉默……」已成为美国最广为人知的法律程序，出现在无数影视作品中。这句话的背后，是对国家权力系统性的约束与制衡。",figures:[{name:"埃内斯托·米兰达",role:"案件当事人，一名普通工人"},{name:"厄尔·沃伦",role:"美国最高法院首席大法官，裁决撰写者"}],impact:"米兰达权利成为美国刑事诉讼的基础规则，将个人权利保护嵌入执法程序，并深刻影响了全球多个国家的法律实践，成为现代法治体系的重要里程碑。",insight:"米兰达案揭示了一个普遍真理：权利如果不被明确告知，就等于不存在。今天大多数用户在点击「同意服务条款」时，并不真正了解自己放弃了什么。隐私权、数据权——如果没有被清晰、简单地告知，在实践中与不存在无异。真正的权利保护，需要从设计上让人「无法不知道」，而不是藏在几十页的法律文本里。",reading:["《正当程序》— 安东尼·刘易斯","《美国宪法史》— 阿基尔·里德·阿马尔"]},
  { month:6,day:20,year:"1789年",title:"网球场宣誓——门被锁上的那一天，革命真正开始",description:"1789年6月20日，法国第三等级代表发现凡尔赛宫会议厅的大门被锁上——路易十六下令封闭了议事场所，试图用这一物理手段终止日益激进的政治讨论。\n\n代表们随即转移到附近一座皇家网球场，在那里庄严宣誓：「无论在什么情况下，只要宪法尚未建立，我们决不解散。」签署者中包括了后来法国历史的主要塑造者——无论是革命英雄还是恐怖统治的制造者。\n\n三周后，巴黎民众攻占了巴士底狱。路易十六试图用关闭会场来压制反抗，却适得其反——被迫转移的宣誓现场反而更具震撼力，这一幕由雅克-路易·大卫绘成的历史画作，成为革命最具象征性的图像之一。",figures:[{name:"让·巴伊",role:"国民议会主席，宣誓主持人，后被革命吞噬"},{name:"路易十六",role:"法国国王，用锁门之举意外点燃了革命"}],impact:"网球场宣誓确立了「人民主权」原则——议员的权力来自人民而非君主。这一原则成为现代民主制度的核心基石，深刻影响了此后两个世纪的政治思想与制度设计。",insight:"门被锁上，反而创造了一个更有力的政治时刻。障碍有时会制造仪式，仪式会制造历史。当正常路径被封堵时，另辟蹊径的行动往往比原计划更具传播力和凝聚力——这个逻辑在今天的产品发布、社会运动乃至商业竞争中同样有效。约束有时是最好的创意催化剂。",reading:["《旧制度与大革命》— 托克维尔","《法国大革命》— 彼得·麦克菲"]},
  { month:6,day:25,year:"1950年",title:"朝鲜战争爆发——没有赢家的战争",description:"1950年6月25日凌晨，北朝鲜军队越过三八线，大规模入侵韩国。战争在没有任何正式宣战的情况下爆发。三天后，汉城陷落。\n\n美国以联合国军名义迅速介入，将战线一路推至鸭绿江边。随后，中国人民志愿军秘密入朝，将战线重新推回三八线附近。三年战争造成数百万人死亡，其中包括约18万中国军人，以及数十万朝鲜和韩国平民。\n\n1953年7月，停战协议签署，双方回到了与战前几乎相同的分界线。三年战争、数百万牺牲，换来的是原状的维持。朝鲜半岛至今仍处于技术上的战争状态——停战协议从未升级为和平条约。",figures:[{name:"金日成",role:"北朝鲜领导人，发动战争的决策者"},{name:"彭德怀",role:"中国人民志愿军司令，入朝参战的指挥者"},{name:"道格拉斯·麦克阿瑟",role:"联合国军最高指挥官，后因主张扩大战争被杜鲁门解职"}],impact:"朝鲜战争奠定了冷战在亚洲的基本格局，强化了美国在亚太的军事存在，深刻影响了中美关系、台海局势和东亚秩序长达数十年，其地缘遗产延续至今。",insight:"朝鲜战争的结局——「没有赢家，回到原点」——是现代局部战争的典型宿命。当战争的政治目标模糊时，无论军事上多么骁勇，都难以形成决定性胜利。对于任何冲突，事先想清楚「什么叫赢」和「赢了之后怎么办」，远比战术上的优势更重要。",reading:["《最寒冷的冬天》— 大卫·哈伯斯塔姆","《朝鲜战争》— 布鲁斯·卡明斯"]},
  { month:7,day:1,year:"1997年",title:"香港回归——一个城市，两种制度，五十年承诺",description:"1997年7月1日午夜，随着英国国旗在香港缓缓降落，查尔斯王子代表英国完成了最后的权力移交。中国国家主席江泽民庄严宣告：「中国对香港恢复行使主权。」156年的殖民统治，在这一刻画上句点。\n\n典礼现场，大雨滂沱。末代港督彭定康在离港前泪眼蒙眬，带走了那面殖民地旗帜。数十万香港市民彻夜守候在电视机前，情绪复杂——既有回归祖国的激动，也有对未来的不确定。\n\n「一国两制」框架承诺香港保留原有制度五十年不变。这一史无前例的制度安排，是邓小平为解决历史遗留问题所作的创造性设计，也开启了一场关于「如何在统一框架内容纳多元」的漫长实验。",figures:[{name:"江泽民",role:"中国国家主席，主持回归典礼"},{name:"彭定康",role:"英国最后一任香港总督"},{name:"董建华",role:"香港首任行政长官"}],impact:"香港回归标志着大英帝国殖民体系的彻底终结，是20世纪后半叶最重要的地缘政治事件之一。「一国两制」的制度实践，也成为此后处理类似历史遗留问题的重要参照。",insight:"香港回归最深刻的命题是：如何在一个统一框架内保持多元？这个问题没有教科书答案。「一国两制」是一种承认差异、试图用时间化解矛盾的创造性制度设计。在企业并购、跨文化团队管理中，同样面临「如何整合而不消灭被整合方的活力」这个永恒难题——强行同质化往往摧毁的正是最有价值的部分。",reading:["《香港：中国的边城》— 弗兰克·韦尔什","《最后的总督》— 克里斯·彭定康"]},
  { month:7,day:2,year:"1964年",title:"《民权法案》签署——美国用了一百年兑现建国承诺",description:"1964年7月2日，美国总统林登·约翰逊在白宫签署了《民权法案》。法案禁止基于种族、肤色、宗教、性别或国籍的歧视，从法律层面终结了美国南部持续近百年的种族隔离制度。\n\n约翰逊是来自得克萨斯的南方人，签署这部法律需要极大的政治勇气。签完字后他对助手说：「我们把南方输给共和党人输了一代人的时间。」事实证明他甚至低估了代价——此后数十年，南方各州几乎全部成为共和党票仓，塑造了今天美国政治版图的基本格局。\n\n法案的签署，离不开马丁·路德·金领导的十年非暴力运动，以及无数在塞尔玛游行、在伯明翰遭受水炮、在公交车上拒绝让座的普通人。改变法律需要政治家，但推动政治家改变的，是不肯妥协的民间力量。",figures:[{name:"林登·约翰逊",role:"美国总统，签署法案时清楚知道政治代价"},{name:"马丁·路德·金",role:"民权运动领袖，法案最重要的推动者"}],impact:"《民权法案》是美国历史上最重要的立法之一，从法律层面终结了种族隔离，为此后的《投票权法案》奠定基础，深刻重塑了美国政治格局，影响延续至今。",insight:"约翰逊签署法案时清楚知道自己将付出巨大政治代价，但他还是签了。真正的领导力，是在清楚看到代价时仍然做正确的事，而不是做对自己有利的事。在今天，这种「以长期正确换短期代价」的决策逻辑，在AI伦理、环境治理、平台监管等领域都迫切需要却极度稀缺。",reading:["《权力的通道》— 罗伯特·卡罗","《马丁·路德·金自传》"]},
  { month:7,day:7,year:"1937年",title:"卢沟桥事变——一声枪响，八年烽火",description:"1937年7月7日深夜，日本驻华军队以一名士兵失踪为借口，要求进入卢沟桥附近的宛平县城搜查。中国守军断然拒绝，双方随即爆发交火。这就是「卢沟桥事变」，中国全面抗日战争由此正式爆发。\n\n事变发生时，各方都未完全预料到它的后果。日本方面，是少壮派军官在没有东京明确授权的情况下发动了冲突；中国方面，国共两党尚处于脆弱的统一战线磋商之中。一个偶发事件，点燃了蓄积已久的火药桶。\n\n八年抗战，中国付出了约三千五百万军民伤亡的惨烈代价。1945年9月2日，日本正式投降，战争才最终落幕。卢沟桥，从此成为中华民族苦难与不屈抗争的永久象征。",figures:[{name:"吉星文",role:"卢沟桥守桥营长，打响抵抗第一枪的指挥官"},{name:"秦德纯",role:"北平市长，事变当夜主持危机谈判"}],impact:"卢沟桥事变将中日局部冲突升级为全面战争，中国举国抗日的局面由此形成。八年抗战深刻重塑了中国的政治格局，为中国共产党的最终胜利创造了历史条件，也奠定了战后东亚秩序的基础。",insight:"卢沟桥事变再次印证了「局部失控如何引发全面冲突」的历史规律——1914年萨拉热窝、1937年卢沟桥，升级的逻辑惊人相似：少数人的冒险行动、系统性的误判和缺失的危机沟通机制。在大国博弈日趋激烈的今天，对「意外升级」风险的管控能力，仍是最关键也最难建立的战略能力。",reading:["《中国的抗日战争》— 拉纳·米特","《从卢沟桥到��珍珠港》— 柯博文"]},
];  // END_EVENTS

/* ─── Helpers ─── */
function getNearestEvent(m, d) {
  const exact = EVENTS.filter(e => e.month === m && e.day === d);
  if (exact.length > 0) return { evs: exact, exact: true };
  const t = m * 31 + d;
  let best = null, bd = Infinity;
  EVENTS.forEach(e => { const ed = e.month * 31 + e.day; let dist = Math.abs(ed - t); dist = Math.min(dist, 365 - dist); if (dist < bd) { bd = dist; best = e; }});
  return { evs: [best], exact: false };
}

const WK = ['日','一','二','三','四','五','六'];
const MZH = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

/* ─── SVG Icons (consistent 1.8px stroke) ─── */
const I = {
  hourglass: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M5 22h14"/><path d="M5 2h14"/><path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22"/><path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/></svg>,
  scroll: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M8 21h12a2 2 0 0 0 2-2v-2H10v2a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v3h4"/><path d="M19 3H9v7h12V5a2 2 0 0 0-2-2z"/></svg>,
  user: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  zap: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
  bulb: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/></svg>,
  book: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
  cal: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
};
function Ic({name, w=14, h=14}) { return <span style={{width:w,height:h,display:'inline-flex'}}>{I[name]}</span>; }

/* ─── Calendar ─── */
function Calendar({ today }) {
  const y = today.getFullYear(), m = today.getMonth() + 1, td = today.getDate();
  const dim = new Date(y, m, 0).getDate();
  const first = new Date(y, m - 1, 1).getDay();
  const prev = new Date(y, m - 1, 0).getDate();
  const evDays = new Set(EVENTS.filter(e => e.month === m).map(e => e.day));

  const cells = [];
  for (let i = first - 1; i >= 0; i--) cells.push({ d: prev - i, c: 'dim' });
  for (let d = 1; d <= dim; d++) {
    let c = d === td ? 'now' : evDays.has(d) ? 'ev' : '';
    cells.push({ d, c });
  }
  const rem = 7 - (cells.length % 7);
  if (rem < 7) for (let i = 1; i <= rem; i++) cells.push({ d: i, c: 'dim' });

  return (
    <div className="cal-card anim-scale" style={{animationDelay:'100ms'}}>
      <div className="cal-rings">
        {[0,1,2,3,4,5,6,7].map(i=><div className="cal-ring" key={i}/>)}
      </div>
      <div className="cal-head">
        <div className="cal-title">{MZH[m-1]}</div>
        <div className="cal-sub">{y}</div>
      </div>
      <div className="cal-body">
        <div className="cal-wk">{WK.map(w=><span key={w}>{w}</span>)}</div>
        <div className="cal-days">
          {cells.map((c,i) => <div key={i} className={`cal-d ${c.c}`}>{c.d}</div>)}
        </div>
      </div>
      <div className="cal-tear"/>
    </div>
  );
}

/* ─── Event Content ─── */
function EventContent({ ev, exact }) {
  const ps = ev.description.split('\n').filter(p => p.trim());
  return (
    <div className="content">
      {!exact && <div className="hint-banner anim-up">今天暂无精确匹配，为你推荐最近的一篇</div>}

      <div className="anim-up" style={{animationDelay:'200ms',marginBottom:40}}>
        <div className="overline">TODAY IN HISTORY</div>
        <div className="ev-badge"><Ic name="cal" w={12} h={12}/> {ev.year}年 · {ev.month}月{ev.day}日</div>
        <h1 className="ev-title">{ev.title}</h1>
        <div className="ev-divider"/>
      </div>

      <div className="sec anim-up" style={{animationDelay:'300ms'}}>
        <div className="sec-label"><Ic name="scroll"/> NARRATIVE</div>
        <div className="sec-body">{ps.map((p,i)=><p key={i}>{p}</p>)}</div>
      </div>

      <div className="sec anim-up" style={{animationDelay:'400ms'}}>
        <div className="sec-label"><Ic name="user"/> KEY FIGURES</div>
        <div className="figs">{ev.figures.map((f,i)=><span className="fig" key={i}>{f.name} <span className="role">{f.role}</span></span>)}</div>
      </div>

      <div className="sec anim-up" style={{animationDelay:'500ms'}}>
        <div className="sec-label"><Ic name="zap"/> CHAIN REACTION</div>
        <div className="sec-body"><p>{ev.impact}</p></div>
      </div>

      <div className="sec anim-up" style={{animationDelay:'600ms'}}>
        <div className="sec-label"><Ic name="bulb"/> INSIGHT</div>
        <div className="insight"><p>{ev.insight}</p></div>
      </div>

      <div className="sec anim-up" style={{animationDelay:'700ms'}}>
        <div className="sec-label"><Ic name="book"/> FURTHER READING</div>
        <div className="reads">{ev.reading.map((r,i)=>(
          <div className="read-item" key={i}>
            <div className="read-icon"><Ic name="book" w={16} h={16}/></div>
            <span className="read-text">{r}</span>
          </div>
        ))}</div>
      </div>
    </div>
  );
}

/* ─── App ─── */
function App() {
  const today = new Date();
  const m = today.getMonth()+1, d = today.getDate(), wd = WK[today.getDay()];
  const { evs, exact } = useMemo(() => getNearestEvent(m, d), []);
  const [idx, setIdx] = React.useState(0);
  const ev = evs[idx];
  const quote = useMemo(() => QUOTES[today.getDate() % QUOTES.length], []);
  const dateStr = `${today.getFullYear()}年${m}月${d}日 · 星期${wd}`;

  return (<>
    <header className="header">
      <div className="header-inner">
        <div className="logo">
          <div className="logo-mark"><Ic name="hourglass" w={18} h={18}/></div>
          <span className="logo-text">History Tells</span>
        </div>
        <span className="header-date">{dateStr}</span>
      </div>
    </header>

    <div className="main-grid">
      <aside className="sidebar">
        <Calendar today={today}/>
        <div className="quote-card anim-scale" style={{animationDelay:'250ms'}}>
          <p className="qt">「{quote.t}」</p>
          <p className="qa">—— {quote.a}</p>
        </div>
        <div className="stats anim-scale" style={{animationDelay:'400ms'}}>
          <div className="stat"><div className="stat-n">{EVENTS.length}</div><div className="stat-l">收录事件</div></div>
          <div className="stat"><div className="stat-n">{new Set(EVENTS.map(e=>e.month)).size}</div><div className="stat-l">覆盖月份</div></div>
        </div>
      </aside>

      <main>
        {ev ? (
          <>
            {evs.length > 1 && (
              <div className="anim-up" style={{display:'flex',gap:8,marginBottom:24,flexWrap:'wrap'}}>
                {evs.map((e,i) => (
                  <button key={i} onClick={()=>setIdx(i)} style={{
                    padding:'5px 16px', borderRadius:20, cursor:'pointer',
                    border:`1px solid ${i===idx?'var(--accent)':'var(--border)'}`,
                    background: i===idx?'var(--accent-bg)':'transparent',
                    fontFamily:'var(--sans)', fontSize:12,
                    color: i===idx?'var(--accent)':'var(--text-muted)',
                    transition:'all 0.15s'
                  }}>{e.year}</button>
                ))}
              </div>
            )}
            <EventContent ev={ev} exact={exact}/>
          </>
        ) : (
          <div className="empty anim-up">
            <div className="empty-icon"><Ic name="scroll" w={28} h={28}/></div>
            <h3>暂无收录</h3><p>这一天的历史事件正在整理中</p>
          </div>
        )}
      </main>
    </div>

    <footer className="footer">
      <p>History Tells — 以史鉴今 · 每日一课</p>
    </footer>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
